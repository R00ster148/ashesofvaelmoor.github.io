/* ---------- State ---------- */
let state;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function genericEventIds(){ return EVENTS.filter(e=>e.category==='generic').map(e=>e.id); }

function freshCompanions(){
  const out={};
  Object.values(CHARACTERS).forEach(c=>{ out[c.id]={trust:c.startTrust, departed:false, lastFavorTurn:-999}; });
  return out;
}
function freshRoadNpcs(){
  const out={};
  Object.entries(ROAD_NPCS).forEach(([key,npc])=>{ out[key]={...npc, discovered:false}; });
  return out;
}
function freshMysterySites(){
  return MYSTERY_SITES.map(m=>({...m, discovered:false}));
}

function freshState(){
  return {
    turn:1, gold:40, grain:35, soldiers:25, faith:60, corruption:8,
    territories:TERRITORY_DATA.map(t=>({...t, conquered:false})),
    companions:freshCompanions(),
    roadNpcs:freshRoadNpcs(),
    mysterySites:freshMysterySites(),
    quests:[], // {id, giverKey, giverType:'location'|'road', title, objectiveText, status:'active'|'complete'}
    inventory:{weapons:[], consumables:[], equipped:null, everEquipped:[]},
    relationships:freshRelationships(), // friction 0-100 per rivalry pair, see RIVALRY_PAIRS
    speedrun:false, runStartTime:null, finalElapsedMs:null,
    log:[], butterflies:[], flags:{}, priorityQueue:[], seen:new Set(),
    eventPool:shuffle(genericEventIds()),
    currentEvent:null, phase:'event', ended:false, travel:null
  };
}

function clampAll(){
  state.gold=Math.max(0,Math.round(state.gold));
  state.grain=Math.max(0,Math.round(state.grain));
  state.soldiers=Math.max(0,Math.round(state.soldiers));
  state.faith=Math.max(0,Math.min(100,Math.round(state.faith)));
  state.corruption=Math.max(0,Math.min(100,Math.round(state.corruption)));
}
function addLog(s, text){ s.log.unshift({turn:s.turn, text}); }
function conqueredCount(s){ return (s||state).territories.filter(t=>t.conquered && !t.final).length; }
function isAttackable(s, t){
  if(t.conquered) return false;
  return t.adj.some(a=> a==='hold' || (s.territories.find(x=>x.id===a) && s.territories.find(x=>x.id===a).conquered));
}
function attackableTargets(s){ return s.territories.filter(t=>isAttackable(s,t)); }
function frontierFor(s, t){
  // Which conquered/held neighbors currently open this territory up
  return t.adj.map(a=> a==='hold' ? 'Ashveil Hold' : (s.territories.find(x=>x.id===a)||{}).name)
    .filter(Boolean);
}

/* ---------- Render: top-level ---------- */
function render(){
  document.getElementById('turnNum').textContent=state.turn;
  document.getElementById('goldVal').textContent=state.gold;
  document.getElementById('grainVal').textContent=state.grain;
  document.getElementById('soldiersVal').textContent=state.soldiers;
  document.getElementById('faithVal').textContent=state.faith;
  document.getElementById('corruptionVal').textContent=state.corruption;
  document.getElementById('faithBar').style.width=state.faith+'%';
  document.getElementById('corruptionBar').style.width=state.corruption+'%';

  renderTerritories();
  renderCompanions();
  renderQuests();
  renderInventory();

  const actionsPanel=document.getElementById('actionsPanel');
  if(state.phase==='event'){
    actionsPanel.style.display='none';
    document.getElementById('activitiesPanel').style.display='none';
    renderEvent();
  } else {
    renderResolvedEvent();
    actionsPanel.style.display='block';
    document.getElementById('activitiesPanel').style.display='block';
    renderActions();
    renderActivities();
  }
  renderChronicle();
}

function renderTerritories(){
  const el=document.getElementById('territories');
  const total=state.territories.filter(t=>!t.final).length;
  const held=conqueredCount();

  let html=`<div class="campaign-progress">
    <div class="campaign-progress-label"><span>Provinces Held</span><span class="mono">${held} / ${total}</span></div>
    <div class="bar-track"><div class="bar-fill campaign" style="width:${Math.round(held/total*100)}%"></div></div>
  </div>`;
  html+=`<div class="required-path-note">Only The King's Road leads to the Ember Wastes — everything else here is optional, and some of it pays better the further you wander.</div>`;

  // Group by region, in a stable order: King's Road first, then the rest alphabetically by first-appearance.
  const regionOrder=[];
  state.territories.forEach(t=>{ if(!regionOrder.includes(t.region)) regionOrder.push(t.region); });

  regionOrder.forEach(region=>{
    const list=state.territories.filter(t=>t.region===region && !t.final);
    const isRequired = region==="The King's Road";
    html+=`<div class="region-group">
      <div class="region-heading ${isRequired?'required':''}"><span>${region}</span><span class="region-tag">${isRequired?'required path':'optional'}</span></div>`;
    html+=list.map(t=>renderTerritoryCard(t)).join('');
    html+=`</div>`;
  });

  // The Ember Wastes itself, shown last, gated behind The King's Road only.
  const finalT=state.territories.find(t=>t.final);
  html+=`<div class="region-group">
    <div class="region-heading required"><span>The Ember Wastes</span><span class="region-tag">journey's end</span></div>
    ${renderTerritoryCard(finalT)}
  </div>`;

  el.innerHTML=html;
}

function renderTerritoryCard(t){
  const locked = !t.conquered && !isAttackable(state,t);
  const attackable = !t.conquered && isAttackable(state,t);
  const cls=['territory-card'];
  if(t.conquered) cls.push('conquered');
  if(locked) cls.push('locked');
  if(attackable) cls.push('attackable');
  if(t.final && attackable) cls.push('final-ready');

  let status;
  if(t.conquered) status='Held by you';
  else if(t.final) status = attackable ? 'The way lies open' : `Sealed — hold ${frontierFor(state,t).join(' or ')} first`;
  else if(locked) status = `Not on frontier — hold ${frontierFor(state,t).join(' or ')} first`;
  else status = `Garrison ${t.garrison} — open to attack`;

  const questMark = t.questGiver ? `<span class="t-quest-mark" title="A notable person can be found here">?</span>` : '';
  let unrestNote='';
  if(t.conquered && (t.unrest||0)>=REVOLT_THRESHOLD){
    cls.push('unrest-critical');
    unrestNote=`<div class="t-unrest-note critical">Unrest is dangerously high here — a revolt feels close.</div>`;
  } else if(t.conquered && (t.unrest||0)>=REVOLT_WARNING_THRESHOLD){
    cls.push('unrest-warning');
    unrestNote=`<div class="t-unrest-note">Growing unrest. A visit might settle things before they worsen.</div>`;
  }

  return `<div class="${cls.join(' ')}">
      <div class="t-name-row"><span class="t-icon">${terrainIconStandalone(t.kind)}</span><span class="t-name">${t.name}</span>${questMark}</div>
      <div class="t-meta"><span>${t.owner}</span><span>${t.conquered?'':'Garrison '+t.garrison}</span></div>
      <div class="t-desc">${t.desc}</div>
      <div class="t-status-line">${status}</div>
      ${unrestNote}
    </div>`;
}

function terrainIconStandalone(kind){
  return `<svg viewBox="-12 -12 24 24" width="18" height="18">${terrainIcon(kind,0,0,1)}</svg>`;
}

function renderQuests(){
  const el=document.getElementById('questList');
  checkQuestCompletion(state);
  if(state.quests.length===0){
    el.innerHTML=`<div class="quest-empty">No quests yet. Notable people you meet while traveling, or find while holding new ground, may ask favors of you.</div>`;
    return;
  }
  el.innerHTML=state.quests.slice().reverse().map(q=>{
    const cls=['quest-card', q.status];
    const tagLabel = q.status==='active' ? 'In Progress' : (q.status==='ready' ? 'Ready' : 'Complete');
    return `<div class="${cls.join(' ')}">
      <div class="quest-title-row"><span class="quest-title">${q.title}</span><span class="quest-status-tag ${q.status}">${tagLabel}</span></div>
      <div class="quest-objective">${q.objectiveText}</div>
      ${q.status==='ready' ? `<button class="quest-claim-btn" data-qid="${q.id}">Claim Reward</button>` : ''}
    </div>`;
  }).join('');
  el.querySelectorAll('.quest-claim-btn').forEach(btn=>{
    btn.onclick=()=>{
      const qid=btn.getAttribute('data-qid');
      const result=claimQuestReward(state, qid);
      renderQuests();
      render();
      if(result){
        const el2=document.getElementById('questList');
        const note=document.createElement('div');
        note.className='travel-result';
        note.style.marginTop='10px';
        note.textContent=result;
        el2.appendChild(note);
      }
    };
  });
}

function renderInventory(){
  const el=document.getElementById('inventoryPanel');
  ensureInventory(state);
  const inv=state.inventory;
  if(inv.weapons.length===0 && inv.consumables.length===0){
    el.innerHTML=`<div class="inventory-empty">Nothing yet. Conquering provinces by force sometimes yields weapons; travelers and trusted companions may give you things along the way.</div>`;
    return;
  }
  let html='';
  if(inv.weapons.length>0){
    html+=`<div class="inventory-subhead">Weapons</div>`;
    html+=inv.weapons.map(id=>{
      const def=ITEM_DEFS[id];
      const isEquipped=inv.equipped===id;
      return `<div class="item-card ${isEquipped?'equipped':''}">
        <div class="item-title-row"><span class="item-name">${def.name}</span>${isEquipped?'<span class="item-equipped-tag">Equipped</span>':''}</div>
        <div class="item-desc">${def.desc}</div>
        <div class="item-effect">${def.effectLabel}</div>
        ${isEquipped
          ? `<button class="item-action-btn" data-unequip="${id}">Unequip</button>`
          : `<button class="item-action-btn equip-btn" data-equip="${id}">Equip</button>`}
      </div>`;
    }).join('');
  }
  if(inv.consumables.length>0){
    html+=`<div class="inventory-subhead">Potions &amp; Trinkets</div>`;
    html+=inv.consumables.map((id,idx)=>{
      const def=ITEM_DEFS[id];
      return `<div class="item-card">
        <div class="item-title-row"><span class="item-name">${def.name}</span></div>
        <div class="item-desc">${def.desc}</div>
        <div class="item-effect">${def.useLabel}</div>
        <button class="item-action-btn equip-btn" data-use="${id}" data-idx="${idx}">Use</button>
      </div>`;
    }).join('');
  }
  el.innerHTML=html;

  el.querySelectorAll('[data-equip]').forEach(btn=>{
    btn.onclick=()=>{
      const result=equipWeapon(state, btn.getAttribute('data-equip'));
      renderInventory(); render();
      if(result) showInlineResult(el, result);
    };
  });
  el.querySelectorAll('[data-unequip]').forEach(btn=>{
    btn.onclick=()=>{
      unequipWeapon(state);
      renderInventory(); render();
    };
  });
  el.querySelectorAll('[data-use]').forEach(btn=>{
    btn.onclick=()=>{
      const result=useConsumable(state, btn.getAttribute('data-use'));
      renderInventory(); render();
      if(result) showInlineResult(el, result);
    };
  });
}
function showInlineResult(container, text){
  const note=document.createElement('div');
  note.className='travel-result';
  note.style.marginTop='10px';
  note.textContent=text;
  container.appendChild(note);
}


function renderCompanions(){
  const el=document.getElementById('companionList');
  el.innerHTML=Object.values(CHARACTERS).map(ch=>{
    const comp=state.companions[ch.id];
    const cls=['companion-card']; if(comp.departed) cls.push('departed');
    const initial=ch.name.replace('General ','').replace('Lady ','').replace('Brother ','').trim()[0];
    return `<div class="${cls.join(' ')}" style="--char-color:${ch.color}" data-char="${ch.id}">
      <div class="char-badge">${initial}</div>

/* ---------- Actions ---------- */
function actionLevy(s){
  if(s.gold<30) return {text:"Korrath shakes her head. 'No coin, no swords, my lord. That's how it's always worked.'"};
  const cap=soldierCap(s);
  if(s.soldiers>=cap) return {text:`Korrath waves off the idea. 'We've no more billets, no more bread to feed them, and no more faith in the smallfolk to spare us their sons. ${s.soldiers} is all Ashveil Hold can field right now.'`};
  s.gold-=30; s.soldiers+=Math.min(4, cap-s.soldiers); s.faith-=2; s.grain-=4;
  return {text:"New levies march into Ashveil Hold's yard, frightened and unready — but they are soldiers now."};
}
function actionForage(s){ s.grain+=9; s.gold+=5; return {text:"Foraging parties and quiet trade with neighboring hamlets bring in supplies."}; }
function actionFortify(s){
  if(s.gold<15) return {text:"There's not enough coin in the treasury to so much as buy nails, let alone fortify the walls."};
  s.gold-=15; s.faith+=3;
  return {text:"Masons reinforce Ashveil Hold's old walls through the night. The garrison sleeps a little easier."};
}
function actionRest(s){ s.faith+=5; s.soldiers=Math.min(soldierCap(s), s.soldiers+1); return {text:"A day of rest. A few stragglers and deserters trickle back to the banner, and the camp's mood lightens."}; }

// Faith and conquered provinces both expand how large an army Ashveil Hold can actually field —
// this is the soft cap that keeps Levy from being an infinite-soldiers button.
function soldierCap(s){
  return 30 + Math.floor(s.faith*0.6) + conqueredCount(s)*6 + (s.flags.courtBarracks?15:0);
}

/* ===================== QUESTS ===================== */
function offerQuest(s, key, giverType){
  if(s.quests.some(q=>q.id===key)) return; // already offered/active/complete
  const npcKey = giverType==='road' ? key.replace('Quest','') : key;
  const def = giverType==='location' ? QUEST_GIVERS[key] : ROAD_NPC_CONTENT[npcKey].quest;
  const title = giverType==='location' ? def.questTitle : def.title;
  const objectiveText = giverType==='location' ? def.questText : def.objectiveText;
  s.quests.push({id:key, giverType, title, objectiveText, status:'active'});
  logButterfly(s, 'quest-offered', `New quest: ${title}`, giverType==='location' ? def.questText : def.offerText);
}
function checkQuestCompletion(s){
  s.quests.forEach(q=>{
    if(q.status!=='active') return;
    let done=false;
    if(q.giverType==='location'){
      // Location quests complete the instant they're offered (offering itself requires holding the territory already)
      done=true;
    } else {
      done = ROAD_NPC_CONTENT[q.id.replace('Quest','')] && ROAD_NPC_CONTENT[q.id.replace('Quest','')].quest.checkComplete(s);
    }
    if(done){ q.status='ready'; }
  });
}
function claimQuestReward(s, questId){
  const q=s.quests.find(x=>x.id===questId);
  if(!q || q.status!=='ready') return null;
  let resultText;
  if(q.giverType==='location'){
    resultText=QUEST_REWARDS[q.id](s);
  } else {
    const npcKey=q.id.replace('Quest','');
    resultText=ROAD_NPC_CONTENT[npcKey].quest.reward(s);
  }
  q.status='complete';
  clampAll();
  addLog(s, `${q.title} (complete): ${resultText}`);
  return resultText;
}
function activeQuestCount(s){ return s.quests.filter(q=>q.status==='active').length; }
function readyQuestCount(s){ return s.quests.filter(q=>q.status==='ready').length; }

function queueAftermath(s, t){
  if(t.questGiver) offerQuest(s, t.questGiver, 'location');
  if(EVENTS_BY_ID[t.id+'Aftermath']){ s.priorityQueue.unshift(t.id+'Aftermath'); return; }
  // Region-secured: fires once, when the last non-final territory in a region falls.
  const regionTerritories=s.territories.filter(x=>x.region===t.region && !x.final);
  const allFallen=regionTerritories.every(x=>x.conquered);
  const key='regionSecured_'+t.region;
  if(allFallen && !s.flags[key]){
    s.flags[key]=true;
    s.priorityQueue.unshift('regionSecuredGeneric');
    s.pendingRegionName=t.region;
  } else if(!s.flags['foothold_'+t.id]){
    s.flags['foothold_'+t.id]=true;
    s.priorityQueue.unshift('footholdGeneric');
  }
}

function march(s,tid,quality,strikeLabel){
  const t=s.territories.find(x=>x.id===tid);
  const committed=Math.floor(s.soldiers*0.55);
  if(committed<6) return {text:"General Korrath refuses outright: 'We don't have enough men to march anywhere, my lord. Not yet — we'd be marching them to a grave, not a battle.'"};
  // Choosing force over diplomacy/caution is the actual point of friction for these two pairs —
  // it builds regardless of whether the attack succeeds, since the disagreement is about the choice itself.
  adjustFriction(s,'korrath','dessa',3);
  adjustFriction(s,'korrath','yenna',3);
  let atk=committed*(0.85+Math.random()*0.3);
  // The strike-timing call (a single well- or poorly-timed signal to advance) swings the attack
  // roll by up to ±20% — a real, meaningful effect, not a cosmetic flourish.
  const q = typeof quality==='number' ? quality : 0;
  atk *= (1 + q*0.2);
  const strikeNote = strikeLabel ? ` ${strikeLabel}` : '';
  const def=t.garrison*(0.88+Math.random()*0.28);
  let gateNote='';
  if(tid==='brackenfort' && s.flags.brackenfortWeak){
    atk*=1.25; delete s.flags.brackenfortWeak;
    gateNote=" The bribed gate holds true — your attack strikes harder than the defenders expect.";
  }
  if(atk>def){
    const losses=Math.round(committed*(def/atk)*0.55);
    s.soldiers-=losses;
    if(t.final){ s.victory=true; return {text:`${strikeNote} The Hollow King's wards shatter like cheap glass. Your soldiers pour into the Ember Wastes as the violet fire ahead rears up to meet you.`}; }
    t.conquered=true; t.garrison=0; t.unrest=0; t.wonByForce=true; s.gold+=15+t.tier*5;
    queueAftermath(s,t);
    let dropNote='';
    const dropped=rollWeaponDrop(s,t);
    if(dropped){
      addItemToInventory(s, dropped.id);
      dropNote=` Among the spoils, your soldiers recover ${dropped.name} — ${dropped.desc}`;
      logButterfly(s,'item-found',`Found ${dropped.name}`,`Recovered from the fall of ${t.name}. ${dropped.effectLabel}`);
    }
    return {text:`${strikeNote} ${CONQUER_TEXT[tid]||defaultConquerText(t)}${gateNote} (-${losses} soldiers, +${15+t.tier*5} gold)${dropNote}`};
  } else {
    const losses=Math.round(committed*0.8);
    s.soldiers-=losses; s.faith-=6;
    const floor = t.final ? 20 : Math.max(4, Math.round(t.garrison*0.4));
    t.garrison=Math.max(floor,Math.round(t.garrison-atk*0.25));
    return {text:`${strikeNote} ${DEFEAT_TEXT[tid]||defaultDefeatText(t)}${gateNote} (-${losses} soldiers, -6 faith)`};
  }
}
function defaultConquerText(t){ return `${t.name} falls after a hard-fought engagement — ${t.owner}'s banners are cut down and your own raised in their place.`; }
function defaultDefeatText(t){ return `${t.name} holds. ${t.owner}'s defenders know this ground better than your soldiers do, and it costs you dearly.`; }

function parley(s,tid){
  const t=s.territories.find(x=>x.id===tid);
  if(t.final) return {text:"Brother Ilun shakes his head slowly. 'There is no parley with what waits in the Ember Wastes. Only an ending.'"};
  if(s.gold<18 || s.faith<5) return {text:"Seris spreads her hands. 'We've neither the coin nor the standing to even open talks, my lord.'"};
  s.gold-=18; s.faith-=5;
  // Choosing diplomacy over force eases the tension Korrath's aggressive instincts create with the
  // companions who'd rather negotiate or avoid casualties — a small, steady counterweight to march().
  adjustFriction(s,'korrath','dessa',-2);
  adjustFriction(s,'korrath','yenna',-2);
  const friendly=['Bandit Lords','The Free Company','The Drowned Fleet'];
  let chance=(friendly.includes(t.owner)?0.42:0.18) - (t.tier-1)*0.05;
  if(s.flags.serisTrustNetwork) chance+=0.08;
  chance=Math.max(0.05, chance);
  if(Math.random()<chance){
    t.conquered=true; t.garrison=0; t.unrest=0; t.wonByForce=false;
    queueAftermath(s,t);
    return {text:`Envoys return with banners lowered: ${t.name} bends the knee without a drop of blood spilled.`};
  } else {
    t.garrison+=2;
    return {text:`The talks collapse before they truly begin. ${t.owner} doubles its watch along the border. (-18 gold, -5 faith, garrison reinforced)`};
  }
}

/* ===================== TRAVEL SEQUENCE ===================== */
function startTravelSequence(tid, mode){
  const t=state.territories.find(x=>x.id===tid);
  const totalDays=t.travelDays||2;
  // Decide if a road NPC encounter or generic encounter happens, weighted toward undiscovered NPCs.
  const undiscoveredNpcs=Object.values(state.roadNpcs).filter(n=>!n.discovered);
  const useNpc = undiscoveredNpcs.length>0 && Math.random()<0.55;
  const npcKey = useNpc ? undiscoveredNpcs[Math.floor(Math.random()*undiscoveredNpcs.length)].id : null;

  state.travel={
    tid, mode, totalDays, day:0,
    encounterDay: 1+Math.floor(Math.random()*Math.max(1,totalDays-1)),
    encounterShown:false,
    encounterIndex: Math.floor(Math.random()*TRAVEL_ENCOUNTERS.length),
    npcKey
  };
  renderTravelStep();
  document.getElementById('travelOverlay').classList.remove('hidden');
}

function renderTravelStep(){
  const travel=state.travel;
  const t=state.territories.find(x=>x.id===travel.tid);
  const box=document.getElementById('travelBox');
  const pct=Math.round((travel.day/travel.totalDays)*100);
  const modeLabel = travel.mode==='march' ? 'Marching toward' : 'Riding toward';

  box.innerHTML=`
    <div class="travel-meta"><svg class="t-icon" viewBox="-12 -12 24 24">${terrainIcon(t.kind,0,0,1)}</svg>${modeLabel} ${t.name}</div>
    <h2>The Road to ${t.name}</h2>
    <div class="travel-progress-track"><div class="travel-progress-fill" style="width:${pct}%"></div></div>
    <div class="travel-days-label"><span>Ashveil Hold</span><span>Day ${travel.day} of ${travel.totalDays}</span><span>${t.name}</span></div>
    <div id="travelStepBody"></div>
  `;
  const body=document.getElementById('travelStepBody');

  if(travel.day===0){
    body.innerHTML=`<p class="travel-text">The column forms up at first light — banners, supply carts, and the particular quiet of soldiers who don't yet know what's waiting for them.</p>
      <div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Set Out</button></div>`;
    document.getElementById('travelNextBtn').onclick=advanceTravel;
    return;
  }

  if(travel.day===travel.encounterDay && !travel.encounterShown){
    if(travel.npcKey){ renderNpcTravelEncounter(); return; }
    const enc=TRAVEL_ENCOUNTERS[travel.encounterIndex];
    body.innerHTML=`<p class="travel-text">${enc.text}</p><div class="choice-list" id="travelChoices"></div>`;
    const list=document.getElementById('travelChoices');
    enc.choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn'; btn.textContent=c.label;
      btn.onclick=()=>{
        const result=c.run(state); clampAll();
        travel.encounterShown=true;
        body.innerHTML=`<p class="travel-text">${enc.text}</p><div class="travel-result">${result}</div><div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>`;
        document.getElementById('travelNextBtn').onclick=advanceTravel;
      };
      list.appendChild(btn);
    });
    return;
  }

  if(travel.day>=travel.totalDays){
    const arrivalLine = travel.mode==='march'
      ? "time to see whose banners are still standing by nightfall."
      : "time to see if words will do what swords don't have to.";
    body.innerHTML=`<p class="travel-text">${t.name} rises into view on the horizon at last — ${arrivalLine}</p>
      <div class="glossary-close-row"><button class="big-btn" id="travelArriveBtn">Arrive</button></div>`;
    document.getElementById('travelArriveBtn').onclick=resolveTravelArrival;
    return;
  }

  body.innerHTML=`<p class="travel-text">The column presses on. Another day's march behind you, the road ahead still long.</p>
    <div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>`;
  document.getElementById('travelNextBtn').onclick=advanceTravel;
}

function renderNpcTravelEncounter(){
  const travel=state.travel;
  const npc=state.roadNpcs[travel.npcKey];
  const content=ROAD_NPC_CONTENT[travel.npcKey];
  const body=document.getElementById('travelStepBody');

  const firstMeeting=!npc.discovered;
  npc.discovered=true;
  logButterfly(state, 'npc-met', `You met ${npc.name} on the road.`, content.introText.replace(/<[^>]+>/g,'').slice(0,140)+'...');

  let giftNote='';
  if(firstMeeting && ROAD_NPC_GIFTS[travel.npcKey]){
    const giftId=ROAD_NPC_GIFTS[travel.npcKey];
    addItemToInventory(state, giftId);
    const giftDef=ITEM_DEFS[giftId];
    giftNote=`<div class="travel-result item-gift-note">Before parting ways, ${npc.name} presses something into your hand: <strong>${giftDef.name}</strong>. ${giftDef.desc}</div>`;
  }

  body.innerHTML=`
    <div class="travel-npc-banner">
      <div class="char-badge" style="--char-color:${npc.color}; background:${npc.color};">${npc.name[0]}</div>
      <div><strong>${content.introTitle}</strong></div>
    </div>
    <p class="travel-text">${content.introText}</p>
    ${giftNote}
    <div class="choice-list" id="travelChoices"></div>
  `;
  const list=document.getElementById('travelChoices');
  content.talks.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=t.label;
    btn.onclick=()=>{
      const result = t.run ? t.run(state) : t.text;
      clampAll();
      travel.encounterShown=true;
      body.innerHTML=`<p class="travel-text">${content.introText}</p>${giftNote}<div class="travel-result">${result}</div><div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>`;
      document.getElementById('travelNextBtn').onclick=advanceTravel;
    };
    list.appendChild(btn);
  });
  if(content.quest && !state.quests.some(q=>q.id===travel.npcKey+'Quest')){
    const qbtn=document.createElement('button');
    qbtn.className='choice-btn';
    qbtn.textContent="Ask if there's anything you can do to help";
    qbtn.onclick=()=>{
      offerQuest(state, travel.npcKey+'Quest', 'road');
      travel.encounterShown=true;
      body.innerHTML=`<p class="travel-text">${content.introText}</p><div class="travel-result">${content.quest.offerText}</div><div class="glossary-close-row"><button class="big-btn" id="travelNextBtn">Continue</button></div>`;
      document.getElementById('travelNextBtn').onclick=advanceTravel;
    };
    list.appendChild(qbtn);
  }
}

function advanceTravel(){ state.travel.day+=1; renderTravelStep(); }

function resolveTravelArrival(){
  const travel=state.travel;
  document.getElementById('travelOverlay').classList.add('hidden');
  state.travel=null;
  if(travel.mode==='march'){ startStrikeTiming(travel.tid); }
  else doAction(s=>parley(s, travel.tid));
}

/* ===================== STRIKE TIMING (the skill element of marching) =====================
   A marker sweeps back and forth across a bar; the player has one chance to stop it. Where it
   lands relative to the highlighted zone determines a multiplier applied to the attack roll in
   march() — a clean hit meaningfully strengthens the assault, a clean miss meaningfully weakens
   it. This is mandatory on every march (no skip), but it is a single deliberate click, not a
   reflex-speed quick-time event — the marker moves slowly enough to be read and timed by eye.
   ------------------------------------------------------------------------------------------ */
let strikeTimingState=null;
function startStrikeTiming(tid){
  const zoneWidth = 14 + Math.random()*6; // 14-20% wide "clean hit" zone, placed randomly each time
  const zoneStart = 8 + Math.random()*(78-zoneWidth);
  strikeTimingState={
    tid, pos:0, dir:1,
    speed: 1.1 + Math.random()*0.4, // % per animation tick
    zoneStart, zoneEnd: zoneStart+zoneWidth,
    rafId:null, stopped:false
  };
  renderStrikeTiming();
  document.getElementById('travelOverlay').classList.remove('hidden');
  document.getElementById('travelBox').classList.add('strike-timing-active');
  tickStrikeTiming();
}
function tickStrikeTiming(){
  const st=strikeTimingState;
  if(!st || st.stopped) return;
  st.pos += st.dir*st.speed;
  if(st.pos>=100){ st.pos=100; st.dir=-1; }
  if(st.pos<=0){ st.pos=0; st.dir=1; }
  const marker=document.getElementById('strikeMarker');
  if(marker) marker.style.left=st.pos+'%';
  st.rafId=requestAnimationFrame(tickStrikeTiming);
}
function renderStrikeTiming(){
  const st=strikeTimingState;
  const t=state.territories.find(x=>x.id===st.tid);
  const box=document.getElementById('travelBox');
  box.innerHTML=`
    <div class="travel-meta"><svg class="t-icon" viewBox="-12 -12 24 24">${terrainIcon(t.kind,0,0,1)}</svg>Striking at ${t.name}</div>
    <h2>Call the Charge</h2>
    <p class="travel-text">Korrath looks to you for the signal. Time it well and the line hits while the defenders are still forming up. Time it badly and you've sent soldiers in ragged and half-ready.</p>
    <div class="strike-timing-track" id="strikeTrack">
      <div class="strike-zone" style="left:${st.zoneStart}%; width:${st.zoneEnd-st.zoneStart}%;"></div>
      <div class="strike-marker" id="strikeMarker" style="left:${st.pos}%;"></div>
    </div>
    <div class="glossary-close-row"><button class="big-btn" id="strikeGoBtn">Give the Signal</button></div>
  `;
  document.getElementById('strikeGoBtn').onclick=resolveStrikeTiming;
}
function resolveStrikeTiming(){
  const st=strikeTimingState;
  if(!st || st.stopped) return;
  st.stopped=true;
  if(st.rafId) cancelAnimationFrame(st.rafId);

  // Quality scales from how far inside (or outside) the zone the stop landed, not just hit/miss —
  // dead center of the zone is the best possible result, the zone's own edges are merely "good".
  let quality; // -1 (worst) .. 1 (best)
  const zoneCenter=(st.zoneStart+st.zoneEnd)/2;
  const zoneHalfWidth=(st.zoneEnd-st.zoneStart)/2;
  if(st.pos>=st.zoneStart && st.pos<=st.zoneEnd){
    const distFromCenter=Math.abs(st.pos-zoneCenter)/zoneHalfWidth; // 0 (center) .. 1 (zone edge)
    quality = 1 - distFromCenter*0.3; // center=1.0, edge of zone=0.7
  } else {
    const distOutside=Math.min(Math.abs(st.pos-st.zoneStart), Math.abs(st.pos-st.zoneEnd));
    quality = -Math.min(1, distOutside/35); // ramps toward -1 the further outside the zone
  }

  const marker=document.getElementById('strikeMarker');
  const track=document.getElementById('strikeTrack');
  if(marker) marker.classList.add(quality>=0.4 ? 'strike-good' : (quality>=-0.1 ? 'strike-ok' : 'strike-bad'));

  const label = quality>=0.85 ? "A perfect strike." : quality>=0.4 ? "A clean strike." : quality>=-0.1 ? "A ragged but workable advance." : quality>=-0.5 ? "A poorly-timed charge." : "The charge goes in completely out of step.";

  setTimeout(()=>{
    document.getElementById('travelOverlay').classList.add('hidden');
    document.getElementById('travelBox').classList.remove('strike-timing-active');
    const tid=st.tid;
    strikeTimingState=null;
    doAction(s=>march(s, tid, quality, label));
  }, 650);
}

/* ---------- Turn resolution ---------- */
function doAction(fn){
  const result=fn(state);
  clampAll();
  addLog(state, result.text);

  if(state.victory){ showEnding(victoryEnding()); return; }
  upkeep();
  const endKey=checkEndings();
  if(endKey){ showEnding(endKey); return; }

  state.turn+=1;
  checkRivalryTriggers(state);

  drawEvent();
  state.phase='event';
  render();
}

function checkRivalryTriggers(s){
  for(const pair of RIVALRY_PAIRS){
    if(s.companions[pair.a].departed || s.companions[pair.b].departed) continue;
    const key=rivalryKey(pair.a,pair.b);
    const eventId='rivalry_'+key;
    if((s.relationships[key]||0)>=RIVALRY_THRESHOLD && !s.seen.has(eventId) && EVENTS_BY_ID[eventId]){
      s.priorityQueue.push(eventId);
    }
  }
}

function upkeep(){
  const consumption=Math.ceil(state.soldiers/6);
  state.grain-=consumption;
  if(state.grain<0){
    let deserters=Math.min(state.soldiers, Math.abs(state.grain)*2);
    if(state.flags.courtGranary) deserters=Math.round(deserters*0.5);
    state.soldiers-=deserters; state.faith-=8; state.grain=0;
    addLog(state, `Starvation stalks the camp. ${deserters} soldiers slip away into the night.`);
  }
  state.territories.forEach(t=>{ if(t.conquered){ state.gold+=t.goldInc; state.grain+=t.grainInc; } });
  if(state.flags.courtMarket) state.gold+=4;
  applyEquippedWeaponUpkeep(state);

  // Corruption recedes slowly on its own, faster if the Hold is warded or the shrine is built —
  // without this, a long campaign's accumulated minor temptations compound into an unwinnable
  // spiral regardless of how the player is actually playing.
  if(state.corruption>0){
    let decay=0.6 + (state.flags.wardProtected?0.5:0);
    if(state.flags.courtShrine) decay*=1.5;
    state.corruption=Math.max(0, state.corruption-decay);
  }

  if(state.corruption>50){
    let chance=(state.corruption-50)/100;
    if(state.flags.wardProtected) chance*=0.5;
    if(state.flags.courtWalls) chance*=0.5;
    if(Math.random()<chance){
      let dmg=3+Math.floor(Math.random()*4);
      if(state.flags.courtWalls) dmg=Math.round(dmg*0.5);
      state.soldiers=Math.max(0,state.soldiers-dmg);
      state.gold=Math.max(0,state.gold-5);
      state.faith-=4;
      addLog(state, `Hollow-touched raiders strike at Ashveil's outer walls in the night. (-${dmg} soldiers, -5 gold, -4 faith)`);
    }
  }
  checkWorldEvents(state);
  checkUnrestAndRevolts(state);
  clampAll();
}

/* ===================== UNREST & REVOLTS =====================
   Every held province quietly accumulates unrest each turn — faster if it was taken by force
   rather than negotiated, faster still under high corruption, and slower under high faith.
   Visiting a province (see actionVisitProvince) resets its unrest to zero. Once unrest crosses
   REVOLT_THRESHOLD there's a real, escalating per-turn chance the province throws off your rule
   entirely: it reverts to its original owner, and a hostile force from it attacks your army on
   the way out the door, exactly like a failed march in reverse.
   ------------------------------------------------------------------------------------------ */
const REVOLT_WARNING_THRESHOLD=55;
const REVOLT_THRESHOLD=75;

function unrestGrowthRate(s, t){
  let rate = t.wonByForce ? 1.1 : 0.6;
  if(s.corruption>50) rate += (s.corruption-50)*0.02;
  if(s.faith>70) rate *= 0.7;
  return rate;
}

function checkUnrestAndRevolts(s){
  const held=s.territories.filter(t=>t.conquered && !t.final);
  held.forEach(t=>{
    if(typeof t.unrest!=='number') t.unrest=0;
    t.unrest=Math.min(100, t.unrest+unrestGrowthRate(s,t));
  });
  // Only ever roll one revolt per turn, and only once a province is genuinely past the threshold —
  // a slow, escalating risk rather than a sudden trap.
  const atRisk=held.filter(t=>t.unrest>=REVOLT_THRESHOLD);
  if(atRisk.length===0) return;
  const t=atRisk[Math.floor(Math.random()*atRisk.length)];
  const chance=Math.min(0.35, (t.unrest-REVOLT_THRESHOLD)/100 + 0.06);
  if(Math.random()>=chance) return;
  triggerRevolt(s, t);
}

function triggerRevolt(s, t){
  t.conquered=false;
  t.unrest=0;
  t.garrison=Math.max(8, Math.round((t.tier||1)*9));
  delete t.wonByForce;
  // The revolting province doesn't just quietly leave — it strikes at your army on the way out,
  // mirroring march()'s loss math so a revolt is a genuine, felt setback, not a free pass.
  const strength=t.garrison*(0.9+Math.random()*0.4);
  const losses=Math.min(s.soldiers, Math.round(strength*0.35));
  s.soldiers-=losses; s.faith-=7;
  logButterfly(s, 'revolt', `${t.name} has thrown off your rule.`, `Years of unrest finally broke into open revolt. ${t.owner}'s old loyalists struck at your garrison as they retook the province, and your soldiers paid for it on the way out. (-${losses} soldiers, -7 faith)`);
  addLog(s, `${t.name} revolts against your rule. ${t.owner}'s loyalists rise up, retake the province, and strike at your retreating soldiers before you can respond. (-${losses} soldiers, -7 faith)`);
}

function actionVisitProvince(s, tid){
  const t=s.territories.find(x=>x.id===tid);
  if(!t || !t.conquered) return {text:"There's no province to visit by that name — or you don't hold it."};
  const before=t.unrest||0;
  t.unrest=0;
  s.faith+=2;
  if(before>=REVOLT_WARNING_THRESHOLD){
    return {text:`A personal visit to ${t.name} does real good — grievances aired, promises made and (for now) believed. The unrest that had been building there quietly settles. (+2 faith)`};
  }
  return {text:`A quiet, unremarkable visit to ${t.name}. Nothing was wrong, particularly, but showing up still counts for something. (+2 faith)`};
}

function victoryEnding(){
  if(state.corruption<35) return 'dawn';
  if(state.corruption<=65) return 'ashking';
  return 'hollowking';
}
function allCompanionsDeparted(){ return Object.values(state.companions).every(c=>c.departed); }
function checkEndings(){
  if(state.corruption>=100) return 'hollowcrown';
  if(state.soldiers<=0) return 'lastbanner';
  if(state.faith<=0) return 'despair';
  if(allCompanionsDeparted()) return 'abandoned';
  return null;
}

/* ===================== EVENT FLOW ===================== */
function resolveEventText(ev){
  // Some events use a function for `text` so they can reference live state (e.g. region names).
  // We resolve it into a plain string on a shallow copy so renderEvent/renderResolvedEvent never
  // have to know the difference, and repeated draws of the same event object don't get mutated permanently.
  if(typeof ev.text==='function'){
    return Object.assign({}, ev, {text: ev.text(state)});
  }
  return ev;
}

function drawEvent(){
  while(state.priorityQueue.length>0){
    const id=state.priorityQueue.shift();
    if(!state.seen.has(id) && EVENTS_BY_ID[id]){ state.currentEvent=resolveEventText(EVENTS_BY_ID[id]); state.seen.add(id); return; }
  }
  let guard=0;
  while(guard<50){
    guard++;
    if(state.eventPool.length===0) state.eventPool=shuffle(genericEventIds());
    const id=state.eventPool.pop();
    const ev=EVENTS_BY_ID[id];
    if(ev.condition && !ev.condition(state)) continue;
    state.currentEvent=resolveEventText(ev); state.seen.add(id);
    return;
  }
  state.currentEvent=resolveEventText(EVENTS_BY_ID['merchantCaravan']);
}

function companionFavorLabel(charId){
  return {
    korrath:"Ask Korrath to personally train the garrison (+ Soldiers, + Faith)",

    ilun:"Ask Ilun for a blessing before your next march (− Corruption, + Faith)",

    brask:"Ask Brask to put the word out for hired swords (costs Gold, + Soldiers)",
    yenna:"Ask Yenna to tend the wounded properly (+ Soldiers, − Grain)"
  }[charId];
}
function companionFavor(charId, s){
  if(charId==='korrath'){ s.soldiers+=3; s.faith+=2; return "Korrath takes the garrison through drills personally for a day. The men fight harder for a general who still bothers to show up. (+3 soldiers, +2 faith)"; }
  if(charId==='seris'){
    const targets=s.territories.filter(t=>!t.conquered && !t.final);
    if(targets.length===0) return "Seris spreads her hands. 'Nothing left to scout, my lord. You've taken it all.'";
    const t=targets[Math.floor(Math.random()*targets.length)];
    t.garrison=Math.max(2,t.garrison-2);
    adjustFriction(s,'seris','yenna',2); adjustFriction(s,'seris','dessa',2);
    return `Seris returns three days later with a hand-drawn map of ${t.name}'s weak points. (${t.name}'s garrison weakened)`;
  }
  if(charId==='ilun'){ s.corruption=Math.max(0,s.corruption-5); s.faith+=3; return "Ilun's blessing is quiet, old, and oddly heavy — like something settling back into place. (-5 corruption, +3 faith)"; }
  if(charId==='dessa'){
    if(s.gold<12) return "Dessa spreads her hands. 'Back-channels aren't free, my lord. Not even mine.'";
    const targets=s.territories.filter(t=>!t.conquered && !t.final);
    if(targets.length===0) return "Dessa shrugs. 'There's no one left to talk to. You've out-negotiated the entire map.'";
    s.gold-=12; s.faith+=2;
    const t=targets[Math.floor(Math.random()*targets.length)];
    t.garrison=Math.max(2,t.garrison-3);
    return `Dessa's letters reach ${t.name} before your soldiers do. Its garrison is noticeably less willing to die for its masters. (-12 gold, ${t.name}'s garrison weakened, +2 faith)`;
  }
  if(charId==='brask'){
    if(s.gold<20) return "Brask taps the table. 'Hired swords want coin up front, lord. That's the whole arrangement.'";
    s.gold-=20; s.soldiers+=5;
    adjustFriction(s,'brask','korrath',2); adjustFriction(s,'ilun','brask',2);
    return "Brask makes a few quiet calls to people who owe him favors of their own. A handful of free company veterans show up by morning. (-20 gold, +5 soldiers)";
  }
  if(charId==='yenna'){
    s.soldiers+=4; s.grain-=5;
    adjustFriction(s,'korrath','yenna',-2);
    return "Yenna spends a full day on soldiers everyone else had already written off. A few surprise her by getting back up. (+4 soldiers, -5 grain)";
  }
  return "";
}

/* ===================== MAP ===================== */
let mapActiveTab='realm';
let mapView={ x:0, y:0, zoom:1, initialized:false }; // pan offset (px) and zoom level, applied to the .vaelmoor-map element

// Mirrors the canvas-sizing math in buildMapSVG() exactly, so JS-side pan/zoom calculations
// agree with where things are actually drawn. Recomputed from live state every time, since
// nothing here is allowed to be a stale hardcoded number.
function mapGeometry(s){
  const scale=1.55, margin=170;
  const allPoints=[[ASHVEIL_HOLD.x,ASHVEIL_HOLD.y]];
  s.territories.forEach(t=>allPoints.push([t.x,t.y]));
  s.mysterySites.forEach(m=>allPoints.push([m.x,m.y]));
  Object.values(s.roadNpcs).forEach(n=>allPoints.push([n.x,n.y]));
  const worldMinX=Math.min(...allPoints.map(p=>p[0])), worldMaxX=Math.max(...allPoints.map(p=>p[0]));
  const worldMinY=Math.min(...allPoints.map(p=>p[1])), worldMaxY=Math.max(...allPoints.map(p=>p[1]));
  const W=Math.round((worldMaxX-worldMinX)*scale + margin*2);
  const H=Math.round((worldMaxY-worldMinY)*scale + margin*2);
  const originX=Math.round(margin - worldMinX*scale);
  const originY=Math.round(margin + worldMaxY*scale);
  return {scale, originX, originY, W, H};
}
function mapWorldToSvg(s,x,y){
  const g=mapGeometry(s);
  return [g.originX + x*g.scale, g.originY - y*g.scale];
}
function mapContentBoundsSvg(s){
  // Real bounding box, in SVG pixel space, of every point that can ever be drawn on the map —
  // territories, Ashveil Hold, mystery sites, and road NPCs — so the initial view can fit all of it
  // regardless of how lopsided the regions are (the King's Road runs much further than others, etc).
  const points=[[ASHVEIL_HOLD.x,ASHVEIL_HOLD.y]];
  s.territories.forEach(t=>points.push([t.x,t.y]));
  s.mysterySites.forEach(m=>points.push([m.x,m.y]));
  Object.values(s.roadNpcs).forEach(n=>points.push([n.x,n.y]));
  const svgPoints=points.map(([x,y])=>mapWorldToSvg(s,x,y));
  const xs=svgPoints.map(p=>p[0]), ys=svgPoints.map(p=>p[1]);
  const pad=70; // room for labels/icons hanging off each node
  return { minX:Math.min(...xs)-pad, maxX:Math.max(...xs)+pad, minY:Math.min(...ys)-pad, maxY:Math.max(...ys)+pad };
}

function openMap(){
  mapActiveTab='realm';
  renderMapOverlay();
  document.getElementById('mapOverlay').classList.remove('hidden');
  // Fit the whole realm in view the first time the map is opened in a session; afterward
  // respect wherever the player last panned/zoomed to.
  requestAnimationFrame(()=>{ if(!mapView.initialized){ fitMapToContent(); mapView.initialized=true; } else { applyMapTransform(); } });
}
function fitMapToContent(){
  const viewport=document.getElementById('mapViewport');
  if(!viewport) return;
  const vw=viewport.clientWidth||760, vh=viewport.clientHeight||560;
  const b=mapContentBoundsSvg(state);
  const contentW=b.maxX-b.minX, contentH=b.maxY-b.minY;
  const zoomX=vw/contentW, zoomY=vh/contentH;
  mapView.zoom=Math.max(0.28, Math.min(1.4, Math.min(zoomX,zoomY)));
  const contentCx=(b.minX+b.maxX)/2, contentCy=(b.minY+b.maxY)/2;
  mapView.x = vw/2 - contentCx*mapView.zoom;
  mapView.y = vh/2 - contentCy*mapView.zoom;
  applyMapTransform();
}
function centerMapOnHold(){
  // Re-center on Ashveil Hold at the current zoom level (used by the reset/"." button).
  const viewport=document.getElementById('mapViewport');
  if(!viewport) return;
  fitMapToContent();
}
function applyMapTransform(){
  const svg=document.getElementById('vaelmoorMapSvg');
  if(!svg) return;
  svg.style.transform=`translate(${mapView.x}px, ${mapView.y}px) scale(${mapView.zoom})`;
}
function renderMapOverlay(){
  const box=document.getElementById('mapBox');
  box.innerHTML=`
    <h2>The Map of Vaelmoor</h2>
    <div class="map-tabs">
      <div class="map-tabs-left">
        <button class="map-tab" data-tab="realm">The Realm</button>
        <button class="map-tab" data-tab="butterflies">Butterfly Log</button>
      </div>
      <div class="map-zoom-controls" id="mapZoomControls">
        <button class="map-zoom-btn" id="mapZoomOut">\u2212</button>
        <button class="map-zoom-btn" id="mapZoomReset">\u2022</button>
        <button class="map-zoom-btn" id="mapZoomIn">+</button>
      </div>
    </div>
    <div id="mapTabContent"></div>
    <div class="glossary-close-row"><button class="big-btn" id="mapCloseBtn">Close</button></div>
  `;
  box.querySelectorAll('.map-tab').forEach(tab=>{
    tab.classList.toggle('active', tab.getAttribute('data-tab')===mapActiveTab);
    tab.onclick=()=>{ mapActiveTab=tab.getAttribute('data-tab'); renderMapOverlay(); };
  });
  document.getElementById('mapCloseBtn').onclick=()=>{ document.getElementById('mapOverlay').classList.add('hidden'); };

  const content=document.getElementById('mapTabContent');
  if(mapActiveTab==='realm'){
    content.innerHTML=`
      <div class="map-viewport" id="mapViewport">${buildMapSVG(state)}</div>
      <div class="map-pan-hint">Drag to pan &middot; scroll or use the buttons above to zoom</div>
      <div class="map-legend">
        <span class="map-legend-item"><span class="map-legend-swatch" style="background:var(--gold)"></span>Conquered</span>
        <span class="map-legend-item"><span class="map-legend-swatch" style="background:var(--text-dim)"></span>Unconquered</span>
        <span class="map-legend-item"><span class="map-legend-swatch" style="background:var(--corrupt)"></span>The Ember Wastes</span>
        <span class="map-legend-item"><span class="map-legend-swatch" style="background:var(--text)"></span>Discovered traveler</span>
      </div>`;
    content.querySelectorAll('.territory-node').forEach(node=>{
      const tid=node.getAttribute('data-tid');
      const t=state.territories.find(x=>x.id===tid);
      const locked = !t.conquered && !isAttackable(state,t);
      node.onclick=()=>{
        let extra;
        if(t.conquered) extra=' — Held by you.';
        else if(locked) extra=` — Garrison ${t.garrison}. Not yet on your frontier; you must first hold: ${frontierFor(state,t).join(' or ')}.`;
        else extra=` — Garrison ${t.garrison}. This province borders your holdings and can be attacked now.`;
        showMapDetail(t.name, t.desc + extra);
      };
    });
    content.querySelectorAll('.site-node').forEach(node=>{

      const site=state.mysterySites.find(x=>x.id===id);
      node.onclick=()=>showMapDetail(site.name, site.desc);
    });
    content.querySelectorAll('.npc-node').forEach(node=>{
      const id=node.getAttribute('data-npc');
      const npc=state.roadNpcs[id];
      const c=ROAD_NPC_CONTENT[id];
      node.onclick=()=>showMapDetail(npc.name, npc.bio + (c.favor ? ` ${c.favor.label}` : ''));
    });
    setupMapPanZoom();
    applyMapTransform();
  } else {
    if(state.butterflies.length===0){
      content.innerHTML=`<div class="butterfly-empty">No great consequences have unfolded yet. Every choice you make will be remembered here.</div>`;
    } else {
      content.innerHTML=`<div class="butterfly-list">${state.butterflies.slice().reverse().map(b=>`
        <div class="butterfly-item">
          <span class="butterfly-turn">Turn ${b.turn}</span>
          <div class="butterfly-headline">${b.headline}</div>
          <div class="butterfly-detail">${b.detail}</div>
        </div>
      `).join('')}</div>`;
    }
  }
}

/* ===================== THE COURT ===================== */
function openCourt(){
  renderCourtOverlay();
  document.getElementById('courtOverlay').classList.remove('hidden');
}
function renderCourtOverlay(){
  const box=document.getElementById('courtBox');
  const built=courtBuildingsBuiltCount(state);
  let html=`
    <h2>The Court at Ashveil Hold</h2>
    <div class="court-intro">Ashveil Hold is more than a treasury and a garrison roster — what you choose to build here outlasts any single campaign. Each structure is a one-time investment with a lasting effect.</div>
    <div class="court-progress">
      <div class="court-progress-label"><span>Structures Built</span><span class="mono">${built} / ${COURT_BUILD_ORDER.length}</span></div>
      <div class="bar-track"><div class="bar-fill campaign" style="width:${Math.round(built/COURT_BUILD_ORDER.length*100)}%"></div></div>
    </div>
    <div class="court-grid">
  `;
  COURT_BUILD_ORDER.forEach(id=>{
    const b=COURT_BUILDINGS[id];
    const isBuilt=isCourtBuildingBuilt(state,id);
    const reqsMet = !b.requires || b.requires.every(r=>isCourtBuildingBuilt(state,r));
    const canAfford = state.gold>=b.cost;
    const cls=['building-card'];
    if(isBuilt) cls.push('built');
    if(!isBuilt && !reqsMet) cls.push('locked');
    let reqNote='';
    if(b.requires && !reqsMet){
      const reqNames=b.requires.map(r=>COURT_BUILDINGS[r].name).join(', ');
      reqNote=`<div class="building-requires">Requires: ${reqNames}</div>`;
    }
    html+=`<div class="${cls.join(' ')}">
      <div class="building-title-row"><span class="building-name">${b.name}</span>${isBuilt?'<span class="building-built-tag">Built</span>':''}</div>
      <div class="building-desc">${b.desc}</div>
      <div class="building-effect">${b.effectLabel}</div>
      ${reqNote}
      ${isBuilt ? '' : `<button class="building-build-btn" data-build="${id}" ${(!reqsMet||!canAfford)?'disabled':''}>${reqsMet ? `Build (${b.cost} gold)` : 'Locked'}</button>`}
    </div>`;
  });
  html+=`</div><div id="courtResult"></div>`;
  box.innerHTML=html;

  box.querySelectorAll('[data-build]').forEach(btn=>{
    btn.onclick=()=>{
      const result=buildCourtStructure(state, btn.getAttribute('data-build'));
      if(result){
        addLog(state, result);
        renderCourtOverlay();
        render();
        const resEl=document.getElementById('courtResult');
        if(resEl){ const note=document.createElement('div'); note.className='travel-result court-result'; note.textContent=result; resEl.appendChild(note); }
      }
    };
  });
}

function showMapDetail(title, desc){
  const content=document.getElementById('mapTabContent');
  const existing=content.querySelector('.map-detail-popup');
  if(existing) existing.remove();
  const detail=document.createElement('div');
  detail.className='butterfly-item map-detail-popup';
  detail.style.marginTop='14px';
  detail.innerHTML=`<div class="butterfly-headline">${title}</div><div class="butterfly-detail">${desc}</div>`;
  content.appendChild(detail);
}

function setupMapPanZoom(){
  const viewport=document.getElementById('mapViewport');
  if(!viewport) return;
  let dragging=false, lastX=0, lastY=0, moved=false;

  function clampZoom(z){ return Math.max(0.32, Math.min(1.6, z)); }

  viewport.addEventListener('mousedown', e=>{
    dragging=true; moved=false; lastX=e.clientX; lastY=e.clientY;
    viewport.classList.add('dragging');
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.abs(dx)>2 || Math.abs(dy)>2) moved=true;
    mapView.x+=dx; mapView.y+=dy;
    lastX=e.clientX; lastY=e.clientY;
    applyMapTransform();
  });
  window.addEventListener('mouseup', ()=>{ dragging=false; viewport.classList.remove('dragging'); });

  // prevent click-through to node handlers when the drag was an actual pan, not a tap
  viewport.addEventListener('click', e=>{ if(moved){ e.stopPropagation(); moved=false; } }, true);

  viewport.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect=viewport.getBoundingClientRect();
    const px=e.clientX-rect.left, py=e.clientY-rect.top;
    const oldZoom=mapView.zoom;
    const newZoom=clampZoom(oldZoom * (e.deltaY<0 ? 1.12 : 0.89));
    // zoom toward cursor position
    mapView.x = px - ((px-mapView.x)/oldZoom)*newZoom;
    mapView.y = py - ((py-mapView.y)/oldZoom)*newZoom;
    mapView.zoom=newZoom;
    applyMapTransform();
  }, {passive:false});

  // touch support (single-finger pan)
  viewport.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }, {passive:true});
  viewport.addEventListener('touchmove', e=>{
    if(!dragging || e.touches.length!==1) return;
    const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
    mapView.x+=dx; mapView.y+=dy;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    applyMapTransform();
  }, {passive:true});
  viewport.addEventListener('touchend', ()=>{ dragging=false; });

  document.getElementById('mapZoomIn').onclick=()=>{ mapView.zoom=clampZoom(mapView.zoom*1.25); applyMapTransform(); };
  document.getElementById('mapZoomOut').onclick=()=>{ mapView.zoom=clampZoom(mapView.zoom*0.8); applyMapTransform(); };
  document.getElementById('mapZoomReset').onclick=()=>{ centerMapOnHold(); };
}

/* ===================== GLOSSARY ===================== */
function renderGlossaryList(filter){
  const el=document.getElementById('glossaryList');
  const q=filter.trim().toLowerCase();
  const items=GLOSSARY.filter(g=>!q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q));
  if(items.length===0){ el.innerHTML=`<div class="glossary-empty">No words found matching "${filter}".</div>`; return; }
  el.innerHTML=items.map(g=>`<div class="glossary-item"><div class="glossary-term">${g.term}</div><div class="glossary-def">${g.def}</div></div>`).join('');
}
function setupGlossary(){
  const btn=document.getElementById('glossaryBtn');
  const overlay=document.getElementById('glossaryOverlay');
  const closeBtn=document.getElementById('glossaryCloseBtn');
  const search=document.getElementById('glossarySearch');
  btn.onclick=()=>{ renderGlossaryList(''); search.value=''; overlay.classList.remove('hidden'); search.focus(); };
  closeBtn.onclick=()=>{ overlay.classList.add('hidden'); };
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.classList.add('hidden'); };
  search.oninput=()=>{ renderGlossaryList(search.value); };
}
function setupMapButton(){
  document.getElementById('mapBtn').onclick=openMap;
  document.getElementById('mapOverlay').onclick=(e)=>{ if(e.target.id==='mapOverlay') document.getElementById('mapOverlay').classList.add('hidden'); };
  document.getElementById('talkOverlay').onclick=(e)=>{ if(e.target.id==='talkOverlay'){ document.getElementById('talkOverlay').classList.add('hidden'); render(); } };
  document.getElementById('courtBtn').onclick=openCourt;
  document.getElementById('courtOverlay').onclick=(e)=>{ if(e.target.id==='courtOverlay') document.getElementById('courtOverlay').classList.add('hidden'); };
}

/* ===================== INTRO / ENDINGS ===================== */
function showEnding(key){
  stopSpeedrunTimer();
  const ending=ENDINGS[key];
  const box=document.getElementById('overlayBox');
  const timeNote = state.speedrun
    ? `<p class="ending-speedrun-time">Final time: ${formatElapsed(state.finalElapsedMs)}</p>`
    : '';
  box.innerHTML=`
    <div class="eyebrow">${ending.eyebrow}</div>
    <h2>${ending.title}</h2>
    <p>${ending.text.replace(/\n\n/g,'</p><p>')}</p>
    <p style="color:var(--text-dim); font-size:14px;">Reached on turn ${state.turn}, with ${state.corruption} corruption and ${conqueredCount()} provinces broken.</p>
    ${timeNote}
    <button class="big-btn" id="restartBtn">Begin Anew</button>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('restartBtn').onclick=startGame;
}
function showIntro(){
  const box=document.getElementById('overlayBox');
  box.innerHTML=`
    <div class="eyebrow">${INTRO.eyebrow}</div>
    <h2>${INTRO.title}</h2>
    <p>${INTRO.text.replace(/\n\n/g,'</p><p>')}</p>
    <div class="mode-select-row">
      <button class="mode-btn" id="beginCasualBtn">
        <span class="mode-btn-title">Casual</span>
        <span class="mode-btn-sub">Take up the Ember Crown at your own pace.</span>
      </button>
      <button class="mode-btn" id="beginSpeedrunBtn">
        <span class="mode-btn-title">Speedrun</span>
        <span class="mode-btn-sub">A timer runs from the moment you begin until the reign ends, one way or another.</span>
      </button>
    </div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('beginCasualBtn').onclick=()=>beginNewGame(false);
  document.getElementById('beginSpeedrunBtn').onclick=()=>beginNewGame(true);
}
function beginNewGame(speedrun){
  document.getElementById('overlay').classList.add('hidden');
  state=freshState();
  state.speedrun=speedrun;
  state.runStartTime=speedrun ? Date.now() : null;
  drawEvent();
  render();
  setupSpeedrunTimer();
}
let speedrunTimerInterval=null;
function setupSpeedrunTimer(){
  const el=document.getElementById('speedrunTimer');
  if(speedrunTimerInterval){ clearInterval(speedrunTimerInterval); speedrunTimerInterval=null; }
  if(!state.speedrun){ el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const tick=()=>{ el.textContent=formatElapsed(Date.now()-state.runStartTime); };
  tick();
  speedrunTimerInterval=setInterval(tick, 250);
}
function formatElapsed(ms){
  const totalSeconds=Math.floor(ms/1000);
  const mins=Math.floor(totalSeconds/60);
  const secs=totalSeconds%60;
  const tenths=Math.floor((ms%1000)/100);
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${tenths}`;
}
function stopSpeedrunTimer(){
  if(speedrunTimerInterval){ clearInterval(speedrunTimerInterval); speedrunTimerInterval=null; }
  if(state.speedrun && state.runStartTime){ state.finalElapsedMs=Date.now()-state.runStartTime; }
}
function startGame(){
  showIntro();
}

setupGlossary();
setupMapButton();
showIntro();
</script>
